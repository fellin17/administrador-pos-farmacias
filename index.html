<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin — Farmacia POS</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;min-height:100vh}

/* LOGIN */
#loginWrap{width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#1e293b,#1d4ed8)}
.login-box{background:white;border-radius:20px;padding:40px 32px;width:100%;max-width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.login-box .ico{font-size:52px;margin-bottom:12px}
.login-box h1{color:#1e293b;font-size:22px;margin-bottom:6px}
.login-box p{color:#64748b;font-size:13px;margin-bottom:28px}
.login-box input{width:100%;padding:13px 15px;border:2px solid #e2e8f0;border-radius:10px;font-size:16px;margin-bottom:12px;outline:none;color:#1e293b}
.login-box input:focus{border-color:#3b82f6}
.btn-entrar{width:100%;padding:14px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);color:white;border:none;border-radius:10px;font-weight:800;font-size:16px;cursor:pointer}
.err-msg{display:none;margin-top:12px;padding:10px;background:#fee2e2;color:#dc2626;border-radius:8px;font-size:13px}

/* PANEL */
#panelWrap{display:none;min-height:100vh}

/* HEADER */
.hdr{background:linear-gradient(135deg,#1e293b,#0f172a);color:white;padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.3)}
.hdr h1{font-size:17px;flex:1}
.hdr .badge{background:linear-gradient(135deg,#3b82f6,#7c3aed);font-size:11px;font-weight:700;padding:4px 12px;border-radius:99px}
.btn-salir{padding:8px 16px;background:transparent;border:1px solid #475569;color:#94a3b8;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.btn-salir:hover{border-color:#ef4444;color:#ef4444}

/* CONTAINER */
.cont{max-width:1100px;margin:0 auto;padding:24px 16px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px}
.stat{background:white;border-radius:14px;padding:18px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid #e2e8f0}
.stat .n{font-size:32px;font-weight:900;margin-bottom:4px}
.stat .l{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;font-weight:700}

/* FILTROS */
.filtros{background:white;border-radius:14px;padding:14px 18px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid #e2e8f0;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filtros label{font-size:12px;font-weight:700;color:#64748b}
.filtros select,.filtros input{padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;color:#1e293b;background:white}
.filtros select:focus,.filtros input:focus{border-color:#3b82f6}
.filtros input{min-width:200px;flex:1}

/* SECCIÓN */
.sec{background:white;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:20px;border:1px solid #e2e8f0;overflow:hidden}
.sec-hdr{padding:14px 18px;border-bottom:2px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;background:linear-gradient(to right,#f8fafc,white)}
.sec-hdr h2{font-size:15px;color:#1e293b;font-weight:800}
.sec-body{padding:16px}

/* GRUPO ADMIN */
.grupo-admin{margin-bottom:24px}
.grupo-admin-header{background:linear-gradient(135deg,#1e293b,#334155);color:white;border-radius:12px;padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.grupo-admin-header .admin-nombre{font-size:16px;font-weight:900;flex:1}
.grupo-admin-header .admin-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.cajeros-lista{padding-left:20px;border-left:3px solid #3b82f6;margin-left:16px}
.cajero-conector{position:relative}
.cajero-conector::before{content:'';position:absolute;left:-23px;top:20px;width:20px;height:2px;background:#3b82f6;opacity:.5}

/* USUARIO CARD */
.u-card{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:12px;padding:14px 16px;margin-bottom:8px;transition:box-shadow .2s}
.u-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.u-card.admin-card{background:linear-gradient(135deg,#f0f9ff,#e0f2fe);border-color:#0ea5e9}
.u-card.cajero-card{background:white;border-color:#e2e8f0}
.u-top{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start}
.u-info{flex:1;min-width:140px}
.u-name{font-size:16px;font-weight:800;color:#1e293b;margin-bottom:4px}
.u-farmacia{font-size:13px;color:#0369a1;font-weight:700;margin-bottom:4px}
.u-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:4px}
.u-acts{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-start}

/* PERMISOS VISUALES */
.permisos-box{margin-top:10px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 12px}
.permisos-titulo{font-size:10px;font-weight:800;color:#166534;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.permisos-grid{display:flex;gap:8px;flex-wrap:wrap}
.permiso-item{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:4px 10px;border-radius:99px}
.permiso-on{background:#dcfce7;color:#166534;border:1px solid #86efac}
.permiso-off{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;text-decoration:line-through;opacity:.6}

/* SIN ADMIN */
.sin-admin-section{margin-bottom:20px}
.sin-admin-header{background:#fef3c7;border:1.5px dashed #f59e0b;border-radius:12px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.sin-admin-header span{font-size:13px;font-weight:700;color:#92400e}

/* DISPOSITIVOS */
.devs{margin-top:10px;border-top:1px solid #e2e8f0;padding-top:10px}
.dev-row{display:flex;align-items:center;gap:8px;background:#e2e8f0;border-radius:8px;padding:7px 10px;margin-bottom:6px;flex-wrap:wrap}
.dev-name{font-size:12px;flex:1;color:#334155;font-weight:600}
.dev-fecha{font-size:11px;color:#94a3b8}

/* TAGS */
.tag{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px}
.tg{background:#dcfce7;color:#166534}
.tr{background:#fee2e2;color:#dc2626}
.tb{background:#dbeafe;color:#1d4ed8}
.ty{background:#fef3c7;color:#92400e}
.tp{background:#f3e8ff;color:#7c3aed}

/* BOTONES */
.btn{padding:7px 12px;border:none;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.85}
.b-pri{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:white}
.b-suc{background:#10b981;color:white}
.b-dan{background:#ef4444;color:white}
.b-war{background:#f59e0b;color:white}
.b-gho{background:#f1f5f9;color:#334155;border:1px solid #cbd5e1}
.b-pur{background:#8b5cf6;color:white}
.b-sm{padding:5px 10px;font-size:11px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.modal-bg.oculto{display:none}
.modal{background:white;border-radius:16px;padding:24px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h3{font-size:16px;font-weight:800;color:#1e293b;margin-bottom:18px}
.campo{margin-bottom:12px}
.campo label{display:block;font-size:12px;color:#64748b;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.campo input,.campo select{width:100%;padding:11px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;color:#1e293b}
.campo input:focus,.campo select:focus{border-color:#3b82f6}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* NOTA PAGO */
.nota-p{font-size:11px;color:#64748b;font-style:italic;margin-top:4px;background:#fef9c3;padding:4px 8px;border-radius:6px;display:inline-block}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;z-index:999;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:700;transform:translateY(60px);opacity:0;transition:all .3s;max-width:320px}
#toast.show{transform:translateY(0);opacity:1}
#toast.success{background:#dcfce7;color:#166534;border:1px solid #10b981}
#toast.error{background:#fee2e2;color:#dc2626;border:1px solid #ef4444}
#toast.info{background:#dbeafe;color:#1d4ed8;border:1px solid #3b82f6}

.empty{text-align:center;padding:32px;color:#94a3b8;font-size:14px}
.venc-ok{background:#dcfce7;color:#166534;border:1px solid #86efac;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:800;display:inline-flex;align-items:center;gap:4px}
.venc-warn{background:#fef3c7;color:#92400e;border:1px solid #f59e0b;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:800;display:inline-flex;align-items:center;gap:4px;animation:pulso .8s infinite alternate}
.venc-danger{background:#fee2e2;color:#dc2626;border:1px solid #ef4444;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:800;display:inline-flex;align-items:center;gap:4px;animation:pulso .5s infinite alternate}
.venc-expired{background:#1e293b;color:white;border:1px solid #475569;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:800;display:inline-flex;align-items:center;gap:4px}
@keyframes pulso{from{opacity:1}to{opacity:.6}}
#alertaVoz{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:500;background:linear-gradient(135deg,#dc2626,#991b1b);color:white;padding:16px 24px;border-radius:14px;font-size:14px;font-weight:700;box-shadow:0 8px 32px rgba(0,0,0,.4);max-width:500px;width:90%;text-align:center;display:none}
#alertaVoz button{margin-top:10px;padding:8px 20px;background:white;color:#dc2626;border:none;border-radius:8px;font-weight:800;cursor:pointer;font-size:13px}
.vista-btn{padding:6px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:white;color:#64748b}
.vista-btn.activo{background:#1d4ed8;color:white;border-color:#1d4ed8}

@media(max-width:600px){
  .hdr{padding:12px 14px}
  .filtros{padding:10px 12px}
  .cajeros-lista{padding-left:10px;margin-left:8px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="login-box">
    <div class="ico">🔐</div>
    <h1>Panel de Administración</h1>
    <p>Farmacia POS — Solo propietario</p>
    <input id="masterPass" type="password" placeholder="Contraseña maestra"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-entrar" onclick="doLogin()">Entrar al Panel →</button>
    <div class="err-msg" id="errMsg">❌ Contraseña incorrecta</div>
  </div>
</div>

<!-- PANEL -->
<div id="panelWrap">
  <div class="hdr">
    <span style="font-size:24px">💊</span>
    <h1>Panel de Administración — Farmacia POS</h1>
    <span class="badge">SUPERADMIN</span>
    <button class="btn-salir" onclick="doLogout()">🚪 Salir</button>
  </div>
  <div class="cont">

    <!-- STATS -->
    <div class="stats">
      <div class="stat"><div class="n" id="stTotal" style="color:#3b82f6">0</div><div class="l">Total usuarios</div></div>
      <div class="stat"><div class="n" id="stAdmins" style="color:#f59e0b">0</div><div class="l">Admins</div></div>
      <div class="stat"><div class="n" id="stCajeros" style="color:#8b5cf6">0</div><div class="l">Cajeros</div></div>
      <div class="stat"><div class="n" id="stAct" style="color:#10b981">0</div><div class="l">Activos</div></div>
      <div class="stat"><div class="n" id="stDisp" style="color:#0ea5e9">0</div><div class="l">Dispositivos</div></div>
      <div class="stat"><div class="n" id="stInact" style="color:#ef4444">0</div><div class="l">Inactivos</div></div>
    </div>

    <!-- FILTROS Y ACCIONES -->
    <div class="filtros">
      <label>🔍</label>
      <input id="filtBuscar" placeholder="Buscar usuario o farmacia..." oninput="aplicarFiltros()">
      <select id="filtRol" onchange="aplicarFiltros()">
        <option value="">Todos los roles</option>
        <option value="admin">👑 Solo Admins</option>
        <option value="cajero">🛒 Solo Cajeros</option>
      </select>
      <select id="filtEstado" onchange="aplicarFiltros()">
        <option value="">Todos los estados</option>
        <option value="activa">🟢 Activos</option>
        <option value="inactiva">🔴 Inactivos</option>
      </select>
      <select id="filtVista" onchange="aplicarFiltros()">
        <option value="arbol">🌳 Vista árbol (Admin → Cajeros)</option>
        <option value="lista">📋 Lista plana</option>
      </select>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="btn b-gho" onclick="recargar()">🔄 Actualizar</button>
        <button class="btn b-pri" onclick="abrirCrear()">➕ Nuevo usuario</button>
      </div>
    </div>

    <!-- GRID DE USUARIOS -->
    <div id="userGrid"><div class="empty">⏳ Cargando...</div></div>
  </div>
</div>

<!-- MODAL -->
<div id="modalU" class="modal-bg oculto">
  <div class="modal">
    <h3 id="mTit">➕ Nuevo usuario</h3>
    <div class="campo"><label>Usuario (minúsculas, sin espacios)</label><input id="mUser" type="text" placeholder="ej: cajero1" autocapitalize="none"></div>
    <div class="campo"><label>Nombre de la farmacia / punto de venta</label><input id="mFarmaciaName" type="text" placeholder="ej: Farmacia Centro"></div>
    <div class="campo"><label>Contraseña</label><input id="mPass" type="text" placeholder="ej: 1234"></div>
    <div class="campo"><label>Rol</label>
      <select id="mRol" onchange="togglePermisosModal(this.value)">
        <option value="cajero">🛒 Cajero — venta e inventario</option>
        <option value="admin">👑 Admin — acceso completo a sus farmacias</option>
      </select>
    </div>
    <div class="campo" id="campoAdminId"><label>ID del Admin al que pertenece</label><input id="mAdminId" type="text" placeholder="ej: farmacia1 (usuario del admin)"></div>
    <div id="seccionPermisos" style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:14px;margin-bottom:12px">
      <div style="font-size:11px;font-weight:800;color:#166534;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">Permisos adicionales del cajero</div>
      <label style="display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer;font-size:14px">
        <input type="checkbox" id="pCorte" style="width:16px;height:16px"> ✂️ Puede hacer corte de caja
      </label>
      <label style="display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer;font-size:14px">
        <input type="checkbox" id="pReportes" style="width:16px;height:16px"> 📊 Puede ver reportes de ventas
      </label>
      <label style="display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer;font-size:14px">
        <input type="checkbox" id="pConfig" style="width:16px;height:16px"> ⚙️ Puede modificar configuración
      </label>
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px">
        <input type="checkbox" id="pInvEdit" checked style="width:16px;height:16px"> 🗑️ Puede eliminar productos del inventario
      </label>
    </div>
    <div class="campo"><label>Dispositivos permitidos</label>
      <select id="mDisp">
        <option value="1">1 dispositivo (plan base)</option>
        <option value="2">2 dispositivos</option>
        <option value="3">3 dispositivos</option>
        <option value="4">4 dispositivos</option>
      </select>
    </div>
    <div class="campo"><label>📅 Fecha de vencimiento de suscripción</label>
      <input id="mVencimiento" type="date" style="width:100%;padding:11px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;color:#1e293b">
      <div id="mVencimientoInfo" style="margin-top:6px;font-size:12px;font-weight:700;display:none"></div>
    </div>
    <div class="campo"><label>Nota de pago (opcional)</label><input id="mNota" type="text" placeholder="ej: Pagó abril 2025"></div>
    <div class="modal-btns">
      <button class="btn b-gho" onclick="cerrarModal()">Cancelar</button>
      <button class="btn b-pri" id="btnG" onclick="guardar()">💾 Guardar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<div id="alertaVoz">
  <div id="alertaVozMsg"></div>
  <button onclick="cerrarAlertaVoz()">✓ Entendido</button>
</div>
