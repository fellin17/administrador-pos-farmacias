<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Administración — Farmacia POS</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #273549;
    --border: #334155; --accent: #3b82f6; --accent-dark: #1d4ed8;
    --green: #10b981; --red: #ef4444; --yellow: #f59e0b; --purple: #8b5cf6;
    --text: #f1f5f9; --muted: #94a3b8; --muted2: #64748b;
    --radius: 12px;
  }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── LOGIN ── */
  #loginWrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0f172a 0%, #1a2d4a 50%, #0f172a 100%);
  }
  .login-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 44px 36px; width: 100%; max-width: 420px; text-align: center;
    box-shadow: 0 30px 80px rgba(0,0,0,.6);
  }
  .login-box .emoji { font-size: 60px; margin-bottom: 12px; display: block; }
  .login-box h1 { font-size: 24px; margin-bottom: 4px; }
  .login-box .sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .login-box input {
    width: 100%; padding: 14px 16px; background: #0f172a; border: 1.5px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 16px; outline: none;
    transition: border .2s; margin-bottom: 14px;
  }
  .login-box input:focus { border-color: var(--accent); }
  .btn-login {
    width: 100%; padding: 15px; background: linear-gradient(135deg, var(--accent-dark), var(--purple));
    color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 16px;
    cursor: pointer; transition: opacity .2s;
  }
  .btn-login:hover { opacity: .9; }
  .login-err {
    background: #450a0a; border: 1px solid var(--red); color: #fca5a5;
    border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-top: 12px; display: none;
  }

  /* ── PANEL PRINCIPAL ── */
  #panelWrap { display: none; }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 28px; display: flex; align-items: center; gap: 14px;
    position: sticky; top: 0; z-index: 100;
  }
  header .logo { font-size: 28px; }
  header h1 { font-size: 18px; font-weight: 800; }
  header .badge {
    background: linear-gradient(135deg, var(--accent-dark), var(--purple));
    color: white; font-size: 11px; font-weight: 700; padding: 3px 10px;
    border-radius: 99px; letter-spacing: .5px;
  }
  header .btn-logout {
    margin-left: auto; padding: 8px 18px; background: #1e293b;
    border: 1px solid var(--border); color: var(--muted); border-radius: 8px;
    font-size: 13px; font-weight: 700; cursor: pointer; transition: all .2s;
  }
  header .btn-logout:hover { border-color: var(--red); color: var(--red); }

  .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

  /* ── STATS CARDS ── */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 14px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; text-align: center;
  }
  .stat-card .num { font-size: 36px; font-weight: 900; margin-bottom: 4px; }
  .stat-card .lbl { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

  /* ── SECCIÓN ── */
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 20px; }
  .section-hdr {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  .section-hdr h2 { font-size: 15px; font-weight: 800; }
  .section-body { padding: 20px; }

  /* ── TABLA USUARIOS ── */
  .user-grid { display: flex; flex-direction: column; gap: 10px; }
  .user-card {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 18px; display: flex; align-items: flex-start; gap: 14px; flex-wrap: wrap;
  }
  .user-card .user-info { flex: 1; min-width: 160px; }
  .user-card .user-name { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
  .user-card .user-meta { font-size: 12px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; }
  .user-card .user-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .user-card .devices { margin-top: 10px; width: 100%; }
  .device-row {
    display: flex; align-items: center; gap: 10px; padding: 7px 10px;
    background: var(--bg); border-radius: 8px; margin-top: 6px; flex-wrap: wrap;
  }
  .device-row .dev-name { font-size: 12px; flex: 1; }
  .device-row .dev-date { font-size: 11px; color: var(--muted2); }

  /* ── BADGES ── */
  .tag {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 99px;
  }
  .tag-green  { background: #064e3b; color: #6ee7b7; }
  .tag-red    { background: #450a0a; color: #fca5a5; }
  .tag-blue   { background: #1e3a5f; color: #93c5fd; }
  .tag-yellow { background: #451a03; color: #fcd34d; }
  .tag-purple { background: #2e1065; color: #c4b5fd; }

  /* ── BOTONES ── */
  .btn {
    padding: 8px 14px; border: none; border-radius: 8px; font-weight: 700;
    font-size: 12px; cursor: pointer; transition: opacity .2s; white-space: nowrap;
  }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-success { background: var(--green); color: white; }
  .btn-danger  { background: var(--red); color: white; }
  .btn-warning { background: var(--yellow); color: #1c1917; }
  .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-purple  { background: var(--purple); color: white; }
  .btn-sm { padding: 5px 10px; font-size: 11px; }

  /* ── MODAL ── */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-bg.hidden { display: none; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 28px; width: 100%; max-width: 460px; box-shadow: 0 30px 80px rgba(0,0,0,.5);
  }
  .modal h3 { font-size: 17px; font-weight: 800; margin-bottom: 20px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 5px; }
  .field input, .field select {
    width: 100%; padding: 11px 13px; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px; outline: none; transition: border .2s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field select option { background: var(--surface); }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 28px; right: 28px; z-index: 999;
    padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 700;
    transform: translateY(80px); opacity: 0; transition: all .3s; max-width: 340px;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { background: #064e3b; color: #6ee7b7; border: 1px solid #10b981; }
  #toast.error   { background: #450a0a; color: #fca5a5; border: 1px solid #ef4444; }
  #toast.info    { background: #1e3a5f; color: #93c5fd; border: 1px solid #3b82f6; }

  /* ── LOADING ── */
  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
  .empty { text-align: center; padding: 40px; color: var(--muted2); font-size: 14px; }

  /* ── NOTAS DE PAGO ── */
  .nota-pago {
    font-size: 11px; color: var(--muted); background: var(--bg);
    border-radius: 6px; padding: 4px 10px; margin-top: 6px; font-style: italic;
  }
  .nota-pago.vencido { color: #fca5a5; background: #450a0a; }
  .nota-pago.vigente { color: #6ee7b7; background: #064e3b; }

  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    .container { padding: 16px 12px; }
    .user-card { padding: 14px; }
    .modal { padding: 20px; }
  }
</style>
</head>
<body>

<!-- ══════════ LOGIN ══════════ -->
<div id="loginWrap">
  <div class="login-box">
    <span class="emoji">🔐</span>
    <h1>Panel de Administración</h1>
    <p class="sub">Farmacia POS — Acceso exclusivo del propietario</p>
    <input id="masterPass" type="password" placeholder="Contraseña maestra"
      onkeydown="if(event.key==='Enter')adminLogin()">
    <button class="btn-login" onclick="adminLogin()">Entrar al Panel →</button>
    <div class="login-err" id="loginErr">Contraseña incorrecta</div>
  </div>
</div>

<!-- ══════════ PANEL ══════════ -->
<div id="panelWrap">
  <header>
    <span class="logo">💊</span>
    <h1>Panel de Administración</h1>
    <span class="badge">SUPERADMIN</span>
    <button class="btn-logout" onclick="adminLogout()">🚪 Salir</button>
  </header>

  <div class="container">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="num" id="statTotal" style="color:var(--accent)">—</div>
        <div class="lbl">Total usuarios</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statActivos" style="color:var(--green)">—</div>
        <div class="lbl">Licencias activas</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statDisp" style="color:var(--yellow)">—</div>
        <div class="lbl">Dispositivos conectados</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statInactivos" style="color:var(--red)">—</div>
        <div class="lbl">Licencias inactivas</div>
      </div>
    </div>

    <!-- Usuarios -->
    <div class="section">
      <div class="section-hdr">
        <h2>👥 Usuarios y Licencias</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-ghost" onclick="recargarUsuarios()">🔄 Actualizar</button>
          <button class="btn btn-primary" onclick="abrirModalCrear()">➕ Nuevo usuario</button>
        </div>
      </div>
      <div class="section-body">
        <div id="userGrid" class="user-grid">
          <div class="loading">⏳ Cargando usuarios...</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ══════════ MODAL: CREAR / EDITAR USUARIO ══════════ -->
<div id="modalUsuario" class="modal-bg hidden">
  <div class="modal">
    <h3 id="modalTitulo">➕ Nuevo usuario</h3>
    <div class="field">
      <label>Usuario (sin espacios, minúsculas)</label>
      <input id="mUser" type="text" placeholder="ej: cajero1" autocapitalize="none" autocorrect="off">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input id="mPass" type="text" placeholder="ej: 1234">
    </div>
    <div class="field">
      <label>Rol</label>
      <select id="mRol">
        <option value="cajero">🛒 Cajero — solo venta e inventario</option>
        <option value="admin">👑 Admin — acceso completo</option>
      </select>
    </div>
    <div class="field">
      <label>Dispositivos permitidos</label>
      <select id="mDisp">
        <option value="1">1 dispositivo (plan base)</option>
        <option value="2">2 dispositivos (+$100 MXN/mes)</option>
        <option value="3">3 dispositivos (+$200 MXN/mes)</option>
        <option value="4">4 dispositivos (+$300 MXN/mes)</option>
        <option value="5">5 dispositivos (+$400 MXN/mes)</option>
      </select>
    </div>
    <div class="field">
      <label>Nota de pago (opcional)</label>
      <input id="mNota" type="text" placeholder="ej: Pagó ene-2025, vence feb-2025">
    </div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" id="btnGuardar" onclick="guardarUsuario()">💾 Guardar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>
